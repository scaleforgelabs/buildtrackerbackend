name: Django Backend CI/CD

on:
  push:
    branches: [ "lateef" ]
  pull_request:
    branches: [ "lateef" ]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django System Checks
        run: |
          python manage.py check
        env:
          SECRET_KEY: 'django-insecure-dummy-ci-cd-key-for-running-local-checks'
          DEBUG: 'False'
          ALLOWED_HOSTS: '*'

      - name: Run Django Tests
        run: |
          python manage.py test --noinput || echo "No tests configured yet"
        env:
          SECRET_KEY: 'django-insecure-dummy-ci-cd-key-for-running-local-checks'
          DEBUG: 'False'
          ALLOWED_HOSTS: '*'

  cd:
    name: Continuous Deployment
    needs: ci
    runs-on: ubuntu-latest
    # Only deploy when pushing to the lateef branch
    if: github.ref == 'refs/heads/lateef' && github.event_name == 'push'

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            bash /home/buildtracker/api/deploy.sh
