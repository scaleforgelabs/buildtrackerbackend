<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Import Poppins to match the frontend -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #F8FAFC;
            margin: 0;
            padding: 0;
            color: #1A202C;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .email-wrapper {
            width: 100%;
            background-color: #F8FAFC;
            padding: 60px 20px;
            box-sizing: border-box;
        }
        .email-content {
            max-width: 560px;
            margin: 0 auto;
            background-color: #FFFFFF;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
            border: 1px solid #E5EAF2;
        }
        .header {
            padding: 40px 48px 24px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #4372E9;
            letter-spacing: -0.5px;
            display: inline-block;
            text-decoration: none;
        }
        .body {
            padding: 0 48px 48px;
            line-height: 1.75;
            font-size: 15px;
            color: #334155;
            word-wrap: break-word;
        }
        .body h2 {
            font-size: 22px;
            color: #0F172A;
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 600;
            line-height: 1.3;
        }
        .body a {
            color: #4372E9;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .body a:hover {
            border-bottom-color: #4372E9;
        }
        .divider {
            height: 1px;
            background-color: #F1F5F9;
            width: calc(100% - 96px);
            margin: 0 auto;
        }
        .footer {
            background-color: #FAFCFF;
            padding: 32px 48px;
            text-align: left;
            font-size: 13px;
            line-height: 1.6;
            color: #737373;
        }
        .footer p {
            margin: 0 0 8px 0;
        }
        .footer-logo {
            font-weight: 600;
            color: #4372E9;
            margin-bottom: 12px;
            display: inline-block;
            font-size: 14px;
        }
        .footer-links {
            margin-top: 20px;
        }
        .footer-links a {
            color: #94A3B8;
            text-decoration: none;
            margin-right: 16px;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .footer-links a:hover {
            color: #4372E9;
        }
        .message-content {
            white-space: normal;
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-content">
            <div class="header">
                <a href="#" class="logo">BuildTracker</a>
            </div>
            <div class="body">
                {% if subject %}<h2 style="font-size:22px;color:#0F172A;margin-top:0;font-weight:600;">{{ subject }}</h2>{% endif %}
                <div class="message-content" style="margin: 0; padding: 0;">{{ message|urlize|linebreaksbr }}</div>
            </div>
            <div class="divider"></div>
            <div class="footer">
                <div class="footer-logo">BuildTracker Co.</div>
                <p>This is an automated notification sent from your BuildTracker workspace.</p>
                <p>Please do not reply directly to this email.</p>
                <div class="footer-links">
                    <a href="#">Privacy Policy</a>
                    <a href="#">Terms of Service</a>
                    <a href="#">Support</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
